name: Flutter APK Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        channel: stable

    - run: flutter pub get

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: apk
        path: build/app/outputs/flutter-apk/*.apk
